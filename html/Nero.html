<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/nero.css">
</head>
<body>

    <!-- Canvas pour l'esprit unique -->
    <canvas id="spirit-canvas"></canvas>

    <div class="guild-card" id="card">
        <div class="avatar-container">
            <!-- Image générée automatiquement si pas de lien -->
            <img src="../images/Nero.jpg" alt="Nero" class="avatar-img">
            <div class="rank-badge">RANG S</div>
        </div>

        <h1>NERO</h1>
        <div class="subtitle">Chasseur d'Élite</div>

        <div class="links">
            <a href="#" class="link-item twitch" target="_blank">
                <div class="link-left">
                    <i class="fa-brands fa-twitch"></i>
                    <span>Twitch</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>

            <a href="#" class="link-item youtube" target="_blank">
                <div class="link-left">
                    <i class="fa-brands fa-youtube"></i>
                    <span>YouTube</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>

            <a href="#" class="link-item discord" target="_blank">
                <div class="link-left">
                    <i class="fa-brands fa-discord"></i>
                    <span>Discord</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </a>
        </div>

        <div class="footer">
            © 2026 HUNTING PARTY
        </div>
    </div>

    <script src="../javascript/Nero.js"></script>
</body>
</html>

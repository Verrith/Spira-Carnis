<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verrith</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/verrith.css">
</head>
<body>

    <!-- BOUTON RETOUR (NOUVEAU) -->
    <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Retour</a>

    <!-- Couches d'effets -->
    <div class="overlay"></div>
    <div class="scanlines"></div>
    <!-- Ligne VHS générée par JS -->
    <div id="vhs-line" class="vhs-line"></div>
    
    <!-- Fond de brume -->
    <div class="fog-container">
        <div class="fog-img"></div>
        <div class="fog-img-2"></div>
    </div>

    <div class="container">
        
        <div class="profile-section">
            <!-- REMPLACEZ LE SRC CI-DESSOUS PAR L'URL DE L'IMAGE -->
            <img src="../images/Cheryl_Mason.png" alt="Profil de Verrith" class="profile-img">
        </div>

        <!-- L'attribut data-text est crucial pour l'effet CSS -->
        <h1 data-text="VERRITH">VERRITH</h1>

        <div class="links">
            <!-- Ajout de la classe 'horror-link' et de l'attribut 'data-text' pour le script -->
            <a href="https://twitch.tv/verrith_" target="_blank" class="link-card horror-link" data-text="Twitch">Twitch</a>
            <a href="#" target="_blank" class="link-card horror-link" data-text="YouTube">YouTube</a>
            <a href="#" target="_blank" class="link-card horror-link" data-text="Twitter / X">Twitter / X</a>
            <a href="#" target="_blank" class="link-card horror-link" data-text="Discord">Discord</a>
            <a href="#" target="_blank" class="link-card horror-link" data-text="TikTok">TikTok</a>
        </div>

        <footer>
            <p>There was a hole here...<br>It's gone now.</p>
        </footer>

    </div>

    <script src="../javascript/verrith.js"></script>
</body>
</html>
